name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libopenmpt-dev pkg-config libgc-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install libopenmpt pkg-config

      # Pin to the released V used for development; V's master HEAD has a
      # codegen regression that breaks `v test` on this project. Use the
      # prebuilt release binary -- building old tags from source fails because
      # `make` pulls an incompatible bootstrap.
      - name: Install V (Linux)
        if: runner.os == 'Linux'
        run: |
          curl -sSL https://github.com/vlang/v/releases/download/0.5.1/v_linux.zip -o v.zip
          unzip -q v.zip
          sudo ./v/v symlink
          v version

      - name: Install V (macOS)
        if: runner.os == 'macOS'
        run: |
          curl -sSL https://github.com/vlang/v/releases/download/0.5.1/v_macos_arm64.zip -o v.zip
          unzip -q v.zip
          sudo ./v/v symlink
          v version

      # Force the system C compiler: the vendored C (miniaudio SIMD, GCC atomic
      # builtins) doesn't compile under V's default tcc backend, which `v test`
      # would otherwise use.
      - name: Build
        run: v -cc cc -o vtrax src

      - name: Test
        run: v -cc cc test src
