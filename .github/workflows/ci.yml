name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libopenmpt-dev pkg-config libgc-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install libopenmpt pkg-config

      - name: Install V
        run: |
          git clone --depth 1 https://github.com/vlang/v
          cd v
          make
          sudo ./v symlink

      # Force the system C compiler: the vendored C (miniaudio SIMD, GCC atomic
      # builtins) doesn't compile under V's default tcc backend, which `v test`
      # would otherwise use.
      - name: Build
        run: v -cc cc -o vtrax src

      - name: Test
        run: v -cc cc test src
